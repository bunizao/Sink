name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repository (owner/name), optional'
        required: false
        type: string
      upstream_branch:
        description: 'Upstream branch, optional'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Resolve upstream
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput('should_run', 'false')

            const inputRepo = '${{ github.event.inputs.upstream_repo || '' }}'.trim()
            const inputBranch = '${{ github.event.inputs.upstream_branch || '' }}'.trim()
            const varRepo = '${{ vars.UPSTREAM_REPO || '' }}'.trim()
            const varBranch = '${{ vars.UPSTREAM_BRANCH || '' }}'.trim()

            let repo = inputRepo || varRepo
            let branch = inputBranch || varBranch

            if (!repo || !branch) {
              const { data } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              })

              if (!repo)
                repo = data.parent?.full_name || ''

              if (!branch)
                branch = data.parent?.default_branch || data.default_branch
            }

            if (!repo) {
              core.notice('No upstream repository configured or detected. Skipping sync.')
              return
            }

            core.setOutput('should_run', 'true')
            core.setOutput('repo', repo)
            core.setOutput('branch', branch)

      - name: Configure Git
        if: steps.resolve.outputs.should_run == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Prepare upstream merge
        id: sync
        if: steps.resolve.outputs.should_run == 'true'
        env:
          UPSTREAM_REPO: ${{ steps.resolve.outputs.repo }}
          UPSTREAM_BRANCH: ${{ steps.resolve.outputs.branch }}
        run: node scripts/sync-upstream.mjs

      - name: Install dependencies
        if: steps.sync.outputs.has_changes == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify excluded overrides
        if: steps.sync.outputs.has_changes == 'true'
        run: pnpm test:sync-upstream

      - name: Run typecheck
        if: steps.sync.outputs.has_changes == 'true'
        run: pnpm types:check

      - name: Build application
        if: steps.sync.outputs.has_changes == 'true'
        run: pnpm build

      - name: Commit sync merge
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git commit -m 'chore: sync upstream (exclude local overrides)'

      - name: Push sync commit
        if: steps.sync.outputs.has_changes == 'true'
        run: git push origin "${{ steps.sync.outputs.current_branch }}"
